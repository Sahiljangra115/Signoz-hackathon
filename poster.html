<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monitors in Black - Official Poster</title>
    <style>
      @font-face {
        font-family: 'Cormorant Garamond';
        font-style: normal;
        font-weight: 600;
        src: url('assets/fonts/cormorant-garamond-semibold.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Cormorant Garamond';
        font-style: italic;
        font-weight: 600;
        src: url('assets/fonts/cormorant-garamond-italic-semibold.woff2') format('woff2');
      }
      @font-face {
        font-family: 'JetBrains Mono';
        font-style: normal;
        font-weight: 500;
        src: url('assets/fonts/jetbrains-mono.woff2') format('woff2');
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html, body {
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: "JetBrains Mono", monospace;
      }
      .poster-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
        background: url('assets/monitors_in_black_bg.jpg') no-repeat center center;
        background-size: cover;
        padding-bottom: 8%;
        text-align: center;
        color: #eef4ef;
      }
      /* Dark vignette overlay to make text highly readable */
      .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.4) 100%);
        pointer-events: none;
        z-index: 1;
      }
      .content {
        position: relative;
        z-index: 2;
        max-width: 90%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .title {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 8.5vw;
        font-weight: 600;
        line-height: 0.95;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: #eef4ef;
        text-shadow: 0 0 40px rgba(0, 255, 102, 0.25);
      }
      .title span {
        color: #00ff66;
        text-shadow: 0 0 50px rgba(0, 255, 102, 0.45);
      }
      .tagline {
        margin-top: 3vh;
        font-size: 1.6vw;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: #8d9c92;
        max-width: 80vw;
        line-height: 1.4;
      }
      .tagline span {
        color: #00ff66;
        font-weight: 700;
      }
      /* Corner frames similar to the deck styling */
      .frame-border {
        position: absolute;
        inset: 3%;
        border: 1px solid rgba(23, 35, 27, 0.4);
        pointer-events: none;
        z-index: 2;
      }
      .frame-border::before, .frame-border::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        border: 1px solid rgba(0, 255, 102, 0.35);
      }
      .frame-border::before {
        top: 15px;
        left: 15px;
        border-right: none;
        border-bottom: none;
      }
      .frame-border::after {
        right: 15px;
        bottom: 15px;
        border-left: none;
        border-top: none;
      }
    </style>
  </head>
  <body>
    <div class="poster-container">
      <div class="overlay"></div>
      <div class="frame-border"></div>
      <div class="content">
        <h1 class="title">Monitors<br><span>In Black</span></h1>
        <p class="tagline">If you can't observe your AI agents,<br><span>you don't own them.</span></p>
      </div>
    </div>
  </body>
</html>
